services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # Use --reload only in development; production Dockerfile CMD has no --reload
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    volumes:
      - .:/app
      - resume_storage:/app/resumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.worker.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    volumes:
      - .:/app
      - resume_storage:/app/resumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.worker.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
      - resume_storage:/app/resumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    # FIX LOW-05 / CRIT-05: Flower is now password-protected
    command: >
      celery -A backend.worker.celery_app flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
    ports:
      # FIX LOW-02: Bind to localhost only — do NOT expose to internet
      - "127.0.0.1:5555:5555"
    env_file:
      - .env
    volumes:
      - .:/app
      - resume_storage:/app/resumes
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: jobbot
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codetrader}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # FIX LOW-02: Bind to localhost only — DB must not be public
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d jobbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    # FIX LOW-02: Bind to localhost only — Redis must not be public
    ports:
      - "127.0.0.1:6379:6379"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      # NOTE: NEXT_PUBLIC_API_URL must point to where the browser can reach the API.
      # In local dev: http://localhost:8000
      # In production: https://your-domain.com/api (use a reverse proxy)
      - NEXT_PUBLIC_API_URL=http://localhost:8000

volumes:
  pgdata:
  resume_storage:
  frontend_node_modules:
